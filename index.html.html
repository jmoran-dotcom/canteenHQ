<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Register — Ysgol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d6a4f;--green-light:#52b788;--green-pale:#d8f3dc;--green-mid:#40916c;
  --amber:#e76f00;--amber-pale:#fff3e0;--blue:#1d6fa4;--blue-pale:#e3f2fd;
  --red:#c0392b;--red-pale:#fdecea;--purple:#6b3fa0;--purple-pale:#f3e8ff;
  --orange:#b5451b;--orange-pale:#fdf0eb;
  --bg:#f5f7f2;--surface:#fff;--border:#dde8d8;--text:#1a2e1a;--text-mid:#4a6741;--text-muted:#7a9470;
  --shadow:0 2px 12px rgba(45,106,79,0.08);--radius:14px;--radius-sm:8px;
  --font:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
header{background:var(--green);color:#fff;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.15);}
.header-left{display:flex;align-items:center;gap:14px;}
.header-logo{width:38px;height:38px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.header-title{font-size:18px;font-weight:600;}
.header-subtitle{font-size:12px;opacity:0.7;margin-top:1px;}
.header-meta{display:flex;align-items:center;gap:1rem;font-size:13px;opacity:0.85;}
.week-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 12px;font-weight:500;font-size:13px;}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;overflow-x:auto;}
nav button{background:none;border:none;border-bottom:3px solid transparent;padding:14px 20px;font-family:var(--font);font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
nav button:hover{color:var(--green);}
nav button.active{color:var(--green);border-bottom-color:var(--green);}
main{padding:2rem;max-width:1200px;margin:0 auto;}
.view{display:none;}.view.active{display:block;}
.class-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
.class-title{font-family:var(--font-display);font-size:28px;color:var(--green);line-height:1.2;}
.class-meta{font-size:13px;color:var(--text-muted);margin-top:4px;}
.day-btn{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.day-btn:hover{background:var(--green-pale);color:var(--green);}
.day-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.menu-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;box-shadow:var(--shadow);}
.menu-panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px;}
.menu-columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.menu-col-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:6px;}
.menu-item{font-size:13px;color:var(--text);padding:3px 0;border-bottom:1px dashed var(--border);line-height:1.4;}
.menu-item:last-child{border-bottom:none;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
.stat-number{font-size:28px;font-weight:600;color:var(--green);font-family:var(--font-display);}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
.register-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:900px){.register-layout{grid-template-columns:1fr;}}
.pupil-list-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.panel-header{background:var(--green-pale);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.panel-header-title{font-size:14px;font-weight:600;color:var(--green);}
.progress-bar-wrap{background:rgba(45,106,79,0.15);border-radius:99px;height:6px;width:100px;}
.progress-bar-fill{background:var(--green);border-radius:99px;height:6px;transition:width 0.4s;}
.pupil-scroll{max-height:520px;overflow-y:auto;}
.pupil-row{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;gap:12px;}
.pupil-row:last-child{border-bottom:none;}
.pupil-row:hover{background:var(--green-pale);}
.pupil-row.selected{background:#e8f5e9;}
.pupil-row.done{opacity:0.55;}
.pupil-row.late-row{border-left:3px solid var(--orange);cursor:default;}
.pupil-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.pupil-name{font-size:14px;font-weight:500;flex:1;}
.pupil-choice-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge-packed{background:var(--amber-pale);color:var(--amber);}
.badge-absent{background:var(--red-pale);color:var(--red);}
.badge-meal{background:var(--green-pale);color:var(--green);}
.badge-pending{background:#f0f0f0;color:#999;}
.badge-late{background:var(--orange-pale);color:var(--orange);}
.choice-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.choice-panel-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.choice-pupil-name{font-family:var(--font-display);font-size:22px;color:var(--green);}
.choice-instruction{font-size:13px;color:var(--text-muted);margin-top:4px;}
.choice-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:14px 20px 8px;}
.option-btn{display:flex;align-items:center;gap:10px;width:calc(100% - 40px);margin:4px 20px;padding:12px 16px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);text-align:left;font-family:var(--font);font-size:14px;color:var(--text);cursor:pointer;transition:all 0.15s;}
.option-btn:hover{border-color:var(--green);background:var(--green-pale);color:var(--green);}
.option-btn.selected{border-color:var(--green);background:var(--green);color:#fff;}
.filling-group{margin:2px 20px 8px;background:var(--bg);border:1.5px solid var(--green-pale);border-radius:var(--radius-sm);overflow:hidden;}
.filling-group-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--green);padding:8px 14px 6px;border-bottom:1px solid var(--green-pale);}
.filling-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;background:none;border:none;border-bottom:1px solid var(--green-pale);text-align:left;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all 0.15s;}
.filling-btn:last-child{border-bottom:none;}
.filling-btn:hover{background:var(--green-pale);color:var(--green);}
.filling-btn.selected{background:var(--green);color:#fff;}
.filling-dot{width:10px;height:10px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;}
.option-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.special-options{padding:0 20px 20px;display:flex;gap:10px;margin-top:8px;}
.special-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.special-btn.packed:hover,.special-btn.packed.selected{background:var(--amber-pale);border-color:var(--amber);color:var(--amber);}
.special-btn.absent:hover,.special-btn.absent.selected{background:var(--red-pale);border-color:var(--red);color:var(--red);}
.confirm-btn{display:block;width:calc(100% - 40px);margin:8px 20px 20px;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.confirm-btn:hover{background:var(--green-mid);}
.empty-choice{padding:3rem 2rem;text-align:center;color:var(--text-muted);}
.empty-choice-icon{font-size:48px;margin-bottom:12px;}
.late-banner{background:var(--orange-pale);border:1px solid #e8a87c;border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.late-banner-text{font-size:14px;font-weight:600;color:var(--orange);}
.late-banner-sub{font-size:12px;color:#b5451b;margin-top:2px;}
.late-add-btn{background:var(--orange);color:#fff;border:none;padding:10px 18px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--surface);border-radius:var(--radius);padding:2rem;max-width:500px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--font-display);font-size:22px;color:var(--orange);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;}
.modal-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg);margin-bottom:1rem;}
.modal-input:focus{outline:none;border-color:var(--orange);}
.modal-field-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1rem;}
.modal-cancel{padding:10px 18px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:none;font-family:var(--font);font-size:14px;cursor:pointer;}
.modal-confirm{padding:10px 18px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;}
.kitchen-header{background:linear-gradient(135deg,var(--green),var(--green-mid));color:#fff;padding:2rem;border-radius:var(--radius);margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.kitchen-title{font-family:var(--font-display);font-size:26px;}
.kitchen-subtitle{font-size:14px;opacity:0.8;margin-top:4px;}
.print-btn{background:#fff;color:var(--green);border:none;padding:10px 20px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;}
.kitchen-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:1.5rem;}
.kitchen-class-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.kcc-header{padding:14px 18px;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between;color:#fff;}
.kcc-body{padding:12px 18px;}
.kcc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.kcc-row:last-child{border-bottom:none;}
.kcc-item{color:var(--text);flex:1;}
.kcc-count{font-weight:700;font-size:16px;color:var(--green);min-width:30px;text-align:right;}
.totals-card{background:var(--surface);border:2px solid var(--green);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);}
.totals-title{font-family:var(--font-display);font-size:20px;color:var(--green);margin-bottom:1rem;}
.totals-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.total-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);font-size:14px;}
.total-item-count{font-weight:700;font-size:18px;color:var(--green);}
.late-kitchen-section{margin-top:1.5rem;background:var(--orange-pale);border:1px solid #e8a87c;border-radius:var(--radius);padding:1.5rem;}
.late-kitchen-title{font-family:var(--font-display);font-size:18px;color:var(--orange);margin-bottom:1rem;}
.late-kitchen-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.late-item{background:var(--surface);border:1px solid #e8a87c;border-radius:var(--radius-sm);padding:10px 14px;}
.late-item-name{font-weight:600;color:var(--text);}
.late-item-class{font-size:11px;color:var(--text-muted);margin-top:2px;}
.late-item-meal{font-size:12px;color:var(--orange);font-weight:500;margin-top:4px;}
.week-controls{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:1.5rem;flex-wrap:wrap;}
.week-controls label{font-size:13px;color:var(--text-muted);font-weight:500;}
.week-select,.day-select{border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);cursor:pointer;}
.toast{position:fixed;bottom:2rem;right:2rem;color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:999;max-width:300px;background:var(--green);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.is-orange{background:var(--orange);}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;}
.dot-complete{background:#52b788;}.dot-partial{background:var(--amber);}.dot-none{background:#ddd;}
.allergen-note{font-size:11px;color:var(--text-muted);font-style:italic;padding:2px 20px 12px;}
.pupil-scroll::-webkit-scrollbar{width:6px;}
.pupil-scroll::-webkit-scrollbar-track{background:var(--bg);}
.pupil-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media print{header,nav,.no-print{display:none!important;}body{background:#fff;}.kitchen-header{background:var(--green)!important;-webkit-print-color-adjust:exact;}.kcc-header{-webkit-print-color-adjust:exact;}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-logo">🍽</div>
    <div>
      <div class="header-title">Dinner Register</div>
      <div class="header-subtitle">Cyfundrefn Bwyd yr Ysgol</div>
    </div>
  </div>
  <div class="header-meta">
    <span style="font-size:13px;opacity:0.8;" id="dateDisplay"></span>
    <span class="week-badge" id="weekBadge">Week 1</span>
  </div>
</header>

<nav>
  <button class="active" onclick="switchView('seren',this)">🌟 Seren Bach</button>
  <button onclick="switchView('y23',this)">📚 Year 2/3</button>
  <button onclick="switchView('y45',this)">📗 Year 4/5</button>
  <button onclick="switchView('y56',this)">📘 Year 5/6</button>
  <button onclick="switchView('kitchen',this)">🍳 Kitchen</button>
</nav>

<main>
  <div id="view-seren" class="view active"></div>
  <div id="view-y23" class="view"></div>
  <div id="view-y45" class="view"></div>
  <div id="view-y56" class="view"></div>

  <div id="view-kitchen" class="view">
    <div class="kitchen-header">
      <div><div class="kitchen-title">Kitchen Summary</div><div class="kitchen-subtitle">Live order counts — updates as registers are completed</div></div>
      <button class="print-btn no-print" onclick="window.print()">🖨️ Print Sheet</button>
    </div>
    <div class="week-controls no-print">
      <label>Viewing:</label>
      <select class="week-select" id="kitchenWeek" onchange="renderKitchen()"><option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option></select>
      <select class="day-select" id="kitchenDay" onchange="renderKitchen()"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
    </div>
    <div class="stats-row" id="kitchenStats"></div>
    <div class="kitchen-grid" id="kitchenClassCards"></div>
    <div class="totals-card"><div class="totals-title">Total Meals Required</div><div class="totals-grid" id="kitchenTotals"></div></div>
    <div id="lateKitchenSection" class="late-kitchen-section" style="display:none;">
      <div class="late-kitchen-title">⏰ Late Arrivals</div>
      <div class="late-kitchen-grid" id="lateKitchenList"></div>
    </div>
  </div>
</main>

<!-- Late arrival modal -->
<div class="modal-overlay" id="lateModal" style="display:none;" onclick="if(event.target===this)closeLateModal()">
  <div class="modal">
    <div class="modal-title">⏰ Late Arrival</div>
    <div class="modal-sub">Enter the pupil's name, their class, and record their meal choice.</div>
    <div class="modal-field-label">Pupil Name</div>
    <input class="modal-input" id="lateName" placeholder="e.g. Seren Hughes" autocomplete="off">
    <div class="modal-field-label">Class</div>
    <select class="modal-input" id="lateClass">
      <option value="seren">Seren Bach</option>
      <option value="y23">Year 2/3</option>
      <option value="y45">Year 4/5</option>
      <option value="y56">Year 5/6</option>
    </select>
    <div class="modal-field-label">Meal Choice</div>
    <div id="lateMenuOptions"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeLateModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmLateArrival()">Add to Register ⏰</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── MENU DATA ───────────────────────────────────────────────────────────────
// Items with | separators: "Display label|Filling1|Filling2..."
const MENU = {

    Tuesday:{mains:['French Bread Pizza','Ravioli in Tomato Sauce & Focaccia','Tuna Mayo / Cheese Jacket Potato|Tuna Mayo|Cheese','Cajun Chicken / Cheese Baguette|Cajun Chicken|Cheese'],carbs:['Wholemeal Savoury Rice','Seasoned Wedges'],veg:['Sweetcorn','Green Beans'],dessert:'Fruit Crumble with Custard'},
    Wednesday:{mains:['Sliced Beef, Yorkshire & Gravy','Sausage, Yorkshire & Gravy','(V) Pork Sausage Pasta in Creamy Tomato Sauce'],carbs:['Roast Potatoes','Mashed/Boiled Potatoes'],veg:['Cabbage','Carrots','Swede'],dessert:'Jam/Fruit Welsh Cakes'},
    Thursday:{mains:['Sweet Chilli Chicken','Margherita Pizza','Chicken Mayo / Cheese Wrap|Chicken Mayo|Cheese','(V) Pasta in Creamy Tomato Sauce'],carbs:['Savoury Herb Diced Potatoes','Noodles'],veg:['BBQ Baked Beans','Mixed Vegetables'],dessert:'Yoghurt'},
    Friday:{mains:['Fish Portion','Beef Burger','Quorn Burger','Chicken Mayo / Cheese Baguette|Chicken Mayo|Cheese'],carbs:['Seasoned Wedges','Chipped Potatoes'],veg:['Corn on Cob','Peas'],dessert:'Flapjack'}
  },
  2:{
    Monday:{mains:['Hot Dog with Onions & Sauce','Hot Dog (plain)','(V) Tomato & Basil Pasta Bake','Fish Goujons','Cajun Chicken / Cheese Baguette|Cajun Chicken|Cheese'],carbs:['Seasoned Wedges','Mashed Potatoes'],veg:['Peas','Coleslaw'],dessert:'Strawberry Flapjack'},
    Tuesday:{mains:['Fruity Chicken Curry','BBQ Chicken','(V) Cauliflower Cheese','Cheese Panini'],carbs:['Rice/Noodles','Savoury Diced Potatoes'],veg:['Mixed Vegetables','Corn on Cob'],dessert:'Fruit & Ice Cream'},
    Wednesday:{mains:['Turkey, Yorkshire, Stuffing & Gravy','(V) Margherita Pizza','BBQ Meatball Baguette|Plain|With Cheese','Cajun Chicken / Cheese Baguette|Cajun Chicken|Cheese'],carbs:['Sage & Thyme Roast Potatoes','Mashed/Boiled Potatoes'],veg:['Carrots','Cabbage','Peas'],dessert:'Jelly'},
    Thursday:{mains:['Jumbo Fish Finger','(V) Macaroni Cheese','Tuna Mayo / Cheese Sandwich|Tuna Mayo|Cheese','(V) Pasta in Creamy Tomato Sauce'],carbs:['Pommes Noisettes','Tomato & Garlic Cheesy Twist Bread'],veg:['Sweetcorn','Baked Beans'],dessert:'Fruit Sponge with Custard'},
    Friday:{mains:['Pork Meatballs','(V) Cheese Omelette','Salmon & Cod Fish Finger','(V) Pasta in Creamy Tomato Sauce'],carbs:['Seasoned Wedges','Crispy Fries'],veg:['Baked Beans','Peas'],dessert:'Plain Cookie'}
  },
  3:{
    Monday:{mains:['Pork Meatballs with Tomato & Basil Sauce','(V) Vegetable Nuggets','Tuna Mayo / Cheese Jacket Potato|Tuna Mayo|Cheese','Chicken Mayo / Cheese Baguette|Chicken Mayo|Cheese'],carbs:['Mashed Potatoes','Pasta'],veg:['Cheesy Coleslaw','Peas & Sweetcorn'],dessert:'Sticky Orange & Date Brownie'},

  y45:{name:'Year 4/5',teacher:'Ms Watkins',color:'#bf360c',pupils:['Adam Butler','Beth Harris','Connor Walsh','Dani Owens','Ethan Cole','Faye Martin','George Hill','Holly Young','Isaac King','Jade Wilson','Keiran Fox','Lauren Shaw','Max Reed','Nina Baker','Oscar Wood','Pippa Long']},
  y56:{name:'Year 5/6',teacher:'Mrs Owen',color:'#2e7d32',pupils:['Alex Campbell','Bella Turner','Callum Ross','Dana Bennett','Elliot Grant','Freya Dixon','Greg Palmer','Harriet Ward','Izzy Cooper','Josh Kelly','Kira Stone','Liam Brooks','Megan Cross','Nathan Webb','Olivia Hart','Patrick Simms']}
};

let choices={}, lateArrivals=[], currentWeek=1, currentDay='', selectedPupil={}, pendingLate=null;

const ACOLS=['#9c27b0','#1976d2','#d84315','#2e7d32','#c2185b','#00796b','#e65100','#283593'];
function initials(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2);}
function esc(s){return s.replace(/'/g,"&#39;");}

function getTodayName(){const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const d=new Date().getDay();return(d===0||d===6)?'Monday':days[d];}
function getWeekNum(){const t=new Date();const w=Math.ceil(((t-new Date(t.getFullYear(),0,1))/86400000+new Date(t.getFullYear(),0,1).getDay()+1)/7);return((w-1)%3)+1;}

function init(){
  document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  currentWeek=getWeekNum(); currentDay=getTodayName();
  document.getElementById('weekBadge').textContent='Week '+currentWeek;
  Object.keys(CLASSES).forEach(k=>{choices[k]={};});
  Object.keys(CLASSES).forEach(k=>renderClassView(k));
  renderKitchen();
}

function switchView(key,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+key).classList.add('active');
  btn.classList.add('active');
  if(key==='kitchen') renderKitchen();
}

      <button class="late-add-btn" onclick="openLateModal('${k}')">+ Add Late Arrival</button>
    </div>

      <div class="stat-card"><div class="stat-number" id="s-packed-${k}">0</div><div class="stat-label">Packed Lunch</div></div>
      <div class="stat-card"><div class="stat-number" id="s-absent-${k}">0</div><div class="stat-label">Absent</div></div>
      <div class="stat-card"><div class="stat-number" id="s-late-${k}" style="color:var(--orange)">0</div><div class="stat-label" style="color:var(--orange)">Late</div></div>
      <div class="stat-card"><div class="stat-number" id="s-pend-${k}">${total}</div><div class="stat-label">Pending</div></div>
    </div>
    <div class="register-layout">
      <div class="pupil-list-panel">
        <div class="panel-header"><span class="panel-header-title">Roll Call</span>
          <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;color:var(--text-muted);">${pct}%</span>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pb-${k}" style="width:${pct}%"></div></div></div>
        </div>
        <div class="pupil-scroll" id="pl-${k}"></div>
      </div>
      <div class="choice-panel" id="cp-${k}">
        <div class="empty-choice"><div class="empty-choice-icon">👆</div><div>Select a pupil to record their choice</div></div>
      </div>
    </div>`;
  renderDaySelector(k); renderMenuPanel(k); renderPupilList(k);

function renderDaySelector(k){
  const el=document.getElementById('days-'+k); if(!el) return;
  ['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(d=>{
    const b=document.createElement('button'); b.className='day-btn'+(d===currentDay?' active':'');
    b.textContent=d.slice(0,3); b.onclick=()=>setDay(d,k,b); el.appendChild(b);
  });
}

function setDay(day,k,btn){
  currentDay=day;
  Object.keys(CLASSES).forEach(c=>{
    document.querySelectorAll(`#days-${c} .day-btn`).forEach(b=>b.classList.toggle('active',b.textContent===day.slice(0,3)));
    renderMenuPanel(c);
  });
  if(selectedPupil.classKey===k&&selectedPupil.pupilName) renderChoicePanel(k,selectedPupil.pupilName);
}

function renderMenuPanel(k){
  const el=document.getElementById('mp-'+k); if(!el) return;
  const m=MENU[currentWeek][currentDay]; if(!m) return;
  el.innerHTML=`<div class="menu-panel-title">Week ${currentWeek} · ${currentDay}'s Menu</div>
    <div class="menu-columns">
      <div><div class="menu-col-label">Mains</div>${m.mains.map(raw=>{const{label,fillings}=parseMI(raw);return`<div class="menu-item">${label}${fillings.length?` <span style="font-size:11px;color:var(--green);font-weight:600;">(${fillings.join(' / ')})</span>`:''}</div>`;}).join('')}</div>
      <div><div class="menu-col-label">Carbohydrates</div>${m.carbs.map(c=>`<div class="menu-item">${c}</div>`).join('')}<div class="menu-col-label" style="margin-top:10px;">Vegetables</div>${m.veg.map(v=>`<div class="menu-item">${v}</div>`).join('')}</div>
      <div><div class="menu-col-label">Dessert</div><div class="menu-item">${m.dessert}</div><div class="menu-col-label" style="margin-top:10px;">Also Daily</div><div class="menu-item">Salad, Fruit, Yoghurt</div><div class="menu-item">Milk or Water · Wholemeal Bread</div></div>
    </div>`;
}

// ─── PUPIL LIST ──────────────────────────────────────────────────────────────
function renderPupilList(k){
  const cls=CLASSES[k], el=document.getElementById('pl-'+k); if(!el) return;
  let html=cls.pupils.map((p,i)=>{
    const c=choices[k][p], col=ACOLS[i%ACOLS.length];
    let badge='<span class="pupil-choice-badge badge-pending">Pending</span>', rc='';
    if(c){
      if(c.type==='packed') badge='<span class="pupil-choice-badge badge-packed">🥪 Packed</span>';
      else if(c.type==='absent') badge='<span class="pupil-choice-badge badge-absent">❌ Absent</span>';
      else{const lbl=c.filling?`${c.main} (${c.filling})`:c.main;badge=`<span class="pupil-choice-badge badge-meal" title="${lbl}">🍽 ${lbl.length>20?lbl.slice(0,18)+'…':lbl}</span>`;}
      rc='done';
    }
    const sel=selectedPupil.classKey===k&&selectedPupil.pupilName===p?'selected':'';
    return `<div class="pupil-row ${rc} ${sel}" onclick="selectPupil('${k}','${esc(p)}')">
      <div class="pupil-avatar" style="background:${col}20;color:${col};">${initials(p)}</div>
      <div class="pupil-name">${p}</div>${badge}</div>`;
  }).join('');
  const lates=lateArrivals.filter(l=>l.classKey===k);
  if(lates.length){
    html+=`<div style="background:var(--orange-pale);padding:8px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--orange);border-top:2px solid #e8a87c;">⏰ Late Arrivals</div>`;
    html+=lates.map(l=>{
      const lbl=l.type==='packed'?'🥪 Packed':l.type==='absent'?'❌ Absent':`🍽 ${l.filling?l.main+' ('+l.filling+')':l.main}`;
      return `<div class="pupil-row done late-row">
        <div class="pupil-avatar" style="background:var(--orange-pale);color:var(--orange);">⏰</div>
        <div class="pupil-name">${l.name}</div>
        <span class="pupil-choice-badge badge-late">${lbl}</span></div>`;
    }).join('');
  }
  el.innerHTML=html;
  updateStats(k);
}

function updateStats(k){
  const cls=CLASSES[k], all=cls.pupils.length, cc=choices[k];
  const meals=Object.values(cc).filter(c=>c.type==='meal').length;
  const packed=Object.values(cc).filter(c=>c.type==='packed').length;
  const absent=Object.values(cc).filter(c=>c.type==='absent').length;
  const lateCount=lateArrivals.filter(l=>l.classKey===k).length;
  const pending=all-meals-packed-absent;
  const g=id=>document.getElementById(id);
  if(g(`s-meals-${k}`)) g(`s-meals-${k}`).textContent=meals;
  if(g(`s-packed-${k}`)) g(`s-packed-${k}`).textContent=packed;
  if(g(`s-absent-${k}`)) g(`s-absent-${k}`).textContent=absent;
  if(g(`s-late-${k}`)) g(`s-late-${k}`).textContent=lateCount;
  if(g(`s-pend-${k}`)) g(`s-pend-${k}`).textContent=pending;
  const pct=all?Math.round((all-pending)/all*100):0;
  const pb=g(`pb-${k}`); if(pb) pb.style.width=pct+'%';
  const meta=g(`meta-${k}`); if(meta) meta.textContent=`${cls.teacher} · ${all} pupils · ${all-pending}/${all} recorded${lateCount>0?' · '+lateCount+' late':''}`;
}

// ─── CHOICE PANEL ────────────────────────────────────────────────────────────
function selectPupil(k,p){ selectedPupil={classKey:k,pupilName:p}; renderPupilList(k); renderChoicePanel(k,p); }

function renderChoicePanel(k,p){
  const panel=document.getElementById('cp-'+k); if(!panel) return;
  const m=MENU[currentWeek][currentDay], ex=choices[k][p]||{};
  let html=`<div class="choice-panel-header"><div class="choice-pupil-name">${p}</div><div class="choice-instruction">Select today's meal choice below</div></div>
    <div class="choice-section-title">School Meal — Choose Main</div>`;
  m.mains.forEach(raw=>{
    const{label,fillings}=parseMI(raw);
    const isV=label.startsWith('(V)')||label.startsWith('(Vg)');
    const isSel=ex.type==='meal'&&ex.main===label;
    html+=`<button class="option-btn ${isSel?'selected':''}" onclick="setMain('${k}','${esc(p)}','${esc(label)}',this)">
      <div class="option-icon">${isV?'🌱':'🍽'}</div><div>${label}</div></button>`;
    if(isSel&&fillings.length>0){
      html+=`<div class="filling-group"><div class="filling-group-label">Choose filling for ${label}</div>
        ${fillings.map(f=>`<button class="filling-btn ${ex.filling===f?'selected':''}" onclick="setFilling('${k}','${esc(p)}','${esc(f)}',this)"><div class="filling-dot"></div>${f}</button>`).join('')}
      </div>`;
    }
  });
  html+=`<div class="allergen-note">Vegetables and carbohydrates served alongside. Allergen info available on request.</div>
    <div class="choice-section-title">Other Options</div>
    <div class="special-options">
      <button class="special-btn packed ${ex.type==='packed'?'selected':''}" onclick="setSpecial('${k}','${esc(p)}','packed',this)">🥪 Packed Lunch</button>
      <button class="special-btn absent ${ex.type==='absent'?'selected':''}" onclick="setSpecial('${k}','${esc(p)}','absent',this)">❌ Absent</button>
    </div>
    <button class="confirm-btn" onclick="confirmChoice('${k}','${esc(p)}')">✓ Confirm &amp; Next Pupil</button>`;
  panel.innerHTML=html;
}

function setMain(k,p,main,btn){
  choices[k][p]={type:'meal',main,filling:''};
  renderChoicePanel(k,p);
}
function setFilling(k,p,filling,btn){
  if(choices[k][p]) choices[k][p].filling=filling;
  btn.parentElement.querySelectorAll('.filling-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function setSpecial(k,p,type,btn){
  choices[k][p]={type,main:'',filling:''};
  renderChoicePanel(k,p);
}

function confirmChoice(k,p){
  const c=choices[k][p];
  if(!c){toast('Please select an option first',false);return;}
  if(c.type==='meal'){
    const raw=MENU[currentWeek][currentDay].mains.find(r=>parseMI(r).label===c.main);
    if(raw&&parseMI(raw).fillings.length>0&&!c.filling){toast('Please choose a filling first',false);return;}
  }
  renderPupilList(k);
  const pupils=CLASSES[k].pupils, idx=pupils.indexOf(p);
  let next=null;
  for(let i=idx+1;i<pupils.length;i++){if(!choices[k][pupils[i]]){next=pupils[i];break;}}
  if(!next){for(let i=0;i<idx;i++){if(!choices[k][pupils[i]]){next=pupils[i];break;}}}
  if(next){selectPupil(k,next);toast(`✓ ${p} recorded — ${next} next`,true);}
  else{
    toast(`✅ All pupils in ${CLASSES[k].name} recorded!`,true);
    selectedPupil={};
    document.getElementById('cp-'+k).innerHTML=`<div class="empty-choice" style="padding:3rem 2rem;"><div class="empty-choice-icon">✅</div><div style="font-weight:600;color:var(--green);">All pupils recorded!</div><div style="font-size:13px;color:var(--text-muted);margin-top:8px;">Check the Kitchen view to see totals</div></div>`;
    renderPupilList(k);
  }
}

// ─── LATE ARRIVALS ───────────────────────────────────────────────────────────
function openLateModal(preClass){
  pendingLate={type:null,main:'',filling:''};
  document.getElementById('lateModal').style.display='flex';
  document.getElementById('lateName').value='';
  if(preClass) document.getElementById('lateClass').value=preClass;
  document.getElementById('lateName').focus();
  renderLateOptions();
}
function closeLateModal(){ document.getElementById('lateModal').style.display='none'; pendingLate=null; }

function renderLateOptions(){
  const m=MENU[currentWeek][currentDay];
  let html='';
  m.mains.forEach(raw=>{
    const{label,fillings}=parseMI(raw);
    const isV=label.startsWith('(V)')||label.startsWith('(Vg)');
    const isSel=pendingLate&&pendingLate.main===label;
    html+=`<button class="option-btn ${isSel?'selected':''}" style="margin:3px 0;width:100%;" onclick="setLateMain('${esc(label)}',this)">
      <div class="option-icon" style="width:22px;height:22px;font-size:13px;">${isV?'🌱':'🍽'}</div><div style="font-size:13px;">${label}</div></button>`;
    if(isSel&&fillings.length>0){
      html+=`<div class="filling-group" style="margin:2px 0 6px;"><div class="filling-group-label">Choose filling</div>
        ${fillings.map(f=>`<button class="filling-btn ${pendingLate.filling===f?'selected':''}" onclick="setLateFilling('${esc(f)}',this)"><div class="filling-dot"></div>${f}</button>`).join('')}
      </div>`;
    }
  });
  html+=`<div style="display:flex;gap:8px;margin-top:10px;">
    <button class="special-btn packed ${pendingLate&&pendingLate.type==='packed'?'selected':''}" onclick="setLateSpecial('packed',this)">🥪 Packed Lunch</button>
    <button class="special-btn absent ${pendingLate&&pendingLate.type==='absent'?'selected':''}" onclick="setLateSpecial('absent',this)">❌ Absent</button>
  </div>`;
  document.getElementById('lateMenuOptions').innerHTML=html;
}

function setLateMain(main,btn){ pendingLate={type:'meal',main,filling:''}; renderLateOptions(); }
function setLateFilling(f,btn){ if(pendingLate) pendingLate.filling=f; btn.parentElement.querySelectorAll('.filling-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function setLateSpecial(type,btn){ pendingLate={type,main:'',filling:''}; renderLateOptions(); }

function confirmLateArrival(){
  const name=document.getElementById('lateName').value.trim();
  const k=document.getElementById('lateClass').value;
  if(!name){toast('Please enter the pupil\'s name',false);return;}
  if(!pendingLate||!pendingLate.type){toast('Please select a meal option',false);return;}
  if(pendingLate.type==='meal'){
    const raw=MENU[currentWeek][currentDay].mains.find(r=>parseMI(r).label===pendingLate.main);
    if(raw&&parseMI(raw).fillings.length>0&&!pendingLate.filling){toast('Please choose a filling',false);return;}
  }
  lateArrivals.push({name,classKey:k,...pendingLate});
  closeLateModal();
  renderPupilList(k); updateStats(k); renderKitchen();
  toast(`⏰ ${name} added as late arrival`,false,true);
}

// ─── KITCHEN ─────────────────────────────────────────────────────────────────
function renderKitchen(){
  const ws=document.getElementById('kitchenWeek'), ds=document.getElementById('kitchenDay');
  if(ws&&!ws.dataset.init){ws.value=currentWeek;ds.value=currentDay;ws.dataset.init='1';}
  const classKeys=Object.keys(CLASSES);
  let tPupils=0,tMeals=0,tPacked=0,tAbsent=0,tPend=0;
  classKeys.forEach(k=>{
    tPupils+=CLASSES[k].pupils.length;
    const cc=choices[k];
    tMeals+=Object.values(cc).filter(c=>c.type==='meal').length;
    tPacked+=Object.values(cc).filter(c=>c.type==='packed').length;
    tAbsent+=Object.values(cc).filter(c=>c.type==='absent').length;
    tPend+=CLASSES[k].pupils.length-Object.values(cc).length;
  });
  tMeals+=lateArrivals.filter(l=>l.type==='meal').length;
  tPacked+=lateArrivals.filter(l=>l.type==='packed').length;
  const tLate=lateArrivals.length;

  document.getElementById('kitchenStats').innerHTML=`
    <div class="stat-card"><div class="stat-number">${tPupils}</div><div class="stat-label">Total Pupils</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--green)">${tMeals}</div><div class="stat-label">School Meals</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--amber)">${tPacked}</div><div class="stat-label">Packed Lunch</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--red)">${tAbsent}</div><div class="stat-label">Absent</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--orange)">${tLate}</div><div class="stat-label">Late Arrivals</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#999">${tPend}</div><div class="stat-label">Pending</div></div>`;

  document.getElementById('kitchenClassCards').innerHTML=classKeys.map(k=>{
    const cls=CLASSES[k], cc=choices[k], col=cls.color;
    const mc={};
    Object.values(cc).filter(c=>c.type==='meal').forEach(c=>{const key=c.filling?`${c.main} (${c.filling})`:c.main;mc[key]=(mc[key]||0)+1;});
    lateArrivals.filter(l=>l.classKey===k&&l.type==='meal').forEach(l=>{const key=l.filling?`${l.main} (${l.filling})`:l.main;mc[key]=(mc[key]||0)+1;});
    const meals=Object.values(cc).filter(c=>c.type==='meal').length+lateArrivals.filter(l=>l.classKey===k&&l.type==='meal').length;
    const packed=Object.values(cc).filter(c=>c.type==='packed').length+lateArrivals.filter(l=>l.classKey===k&&l.type==='packed').length;
    const absent=Object.values(cc).filter(c=>c.type==='absent').length;
    const pend=cls.pupils.length-Object.values(cc).length;
    const lc=lateArrivals.filter(l=>l.classKey===k).length;
    const dot=pend===0?'dot-complete':pend<cls.pupils.length?'dot-partial':'dot-none';
    return `<div class="kitchen-class-card">
      <div class="kcc-header" style="background:${col};"><span>${cls.name}</span><span style="font-size:12px;opacity:0.85;"><span class="status-dot ${dot}"></span>${pend===0?'Complete':pend+' pending'}</span></div>
      <div class="kcc-body">
        ${Object.entries(mc).length?Object.entries(mc).map(([m,n])=>`<div class="kcc-row"><span class="kcc-item">${m}</span><span class="kcc-count">${n}</span></div>`).join(''):'<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">No meals recorded yet</div>'}
        ${packed>0?`<div class="kcc-row"><span class="kcc-item" style="color:var(--amber)">🥪 Packed Lunch</span><span class="kcc-count" style="color:var(--amber)">${packed}</span></div>`:''}
        ${absent>0?`<div class="kcc-row"><span class="kcc-item" style="color:var(--red)">❌ Absent</span><span class="kcc-count" style="color:var(--red)">${absent}</span></div>`:''}
        ${lc>0?`<div class="kcc-row"><span class="kcc-item" style="color:var(--orange);font-size:11px;font-weight:600;">⏰ Includes ${lc} late arrival${lc>1?'s':''}</span></div>`:''}
        <div style="border-top:2px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:13px;">
          <span style="color:var(--text-muted);">Total meals</span><span style="font-weight:700;color:${col}">${meals}</span></div>
      </div></div>`;
  }).join('');

  const gt={};
  classKeys.forEach(k=>{Object.values(choices[k]).filter(c=>c.type==='meal').forEach(c=>{const key=c.filling?`${c.main} (${c.filling})`:c.main;gt[key]=(gt[key]||0)+1;});});
  lateArrivals.filter(l=>l.type==='meal').forEach(l=>{const key=l.filling?`${l.main} (${l.filling})`:l.main;gt[key]=(gt[key]||0)+1;});
  const sorted=Object.entries(gt).sort((a,b)=>b[1]-a[1]);
  document.getElementById('kitchenTotals').innerHTML=sorted.length
    ?sorted.map(([m,n])=>`<div class="total-item"><span>${m}</span><span class="total-item-count">${n}</span></div>`).join('')
    :'<div style="color:var(--text-muted);font-size:14px;grid-column:1/-1;text-align:center;padding:1rem;">No meal choices recorded yet.</div>';

  const ls=document.getElementById('lateKitchenSection');
  const ll=document.getElementById('lateKitchenList');
  if(lateArrivals.length>0){
    ls.style.display='block';
    ll.innerHTML=lateArrivals.map(l=>{
      const lbl=l.type==='packed'?'🥪 Packed Lunch':l.type==='absent'?'❌ Absent':`🍽 ${l.filling?l.main+' ('+l.filling+')':l.main}`;
      return `<div class="late-item"><div class="late-item-name">${l.name}</div><div class="late-item-class">${CLASSES[l.classKey].name}</div><div class="late-item-meal">${lbl}</div></div>`;
    }).join('');
  } else { ls.style.display='none'; }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg,green=true,orange=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(orange?' is-orange':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
